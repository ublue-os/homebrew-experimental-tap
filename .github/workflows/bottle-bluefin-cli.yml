name: Build bluefin-cli Bottles
on:
  push:
    branches:
      - main
    paths:
      - 'Formula/bluefin-cli.rb'
  repository_dispatch:
    types: [build-bluefin-cli-bottle]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. v0.0.4 or 0.0.4)'
        required: true

jobs:
  update-formula:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.check.outputs.latest_version }}
      needs-update: ${{ steps.check.outputs.needs_update }}
      branch: ${{ steps.set-branch.outputs.branch }}
      pr-number: ${{ steps.create-pr.outputs.pull-request-number }}
      working-branch: ${{ steps.set-working-branch.outputs.working-branch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check version and determine if update needed
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.client_payload.version || github.event.inputs.version }}" ]; then
            TARGET_INPUT="${{ github.event.client_payload.version || github.event.inputs.version }}"
            TARGET_TAG="${TARGET_INPUT#v}"
            echo "Checking manual version request: ${TARGET_TAG}"
          else
            echo "Checking for latest GitHub release..."
            TARGET_TAG=$(gh release view --repo hanthor/bluefin-cli --json tagName --jq .tagName)
            TARGET_TAG="${TARGET_TAG#v}"
          fi

          echo "latest_version=${TARGET_TAG}" >> "$GITHUB_OUTPUT"

          CURRENT_VERSION=$(grep -oP '^  url "https://github.com/hanthor/bluefin-cli/archive/refs/tags/v\K[^\"]+(?=\.tar\.gz")' Formula/bluefin-cli.rb)
          echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"

          if [ "$TARGET_TAG" != "$CURRENT_VERSION" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
            echo "Update needed: $CURRENT_VERSION -> $TARGET_TAG"

            SOURCE_URL="https://github.com/hanthor/bluefin-cli/archive/refs/tags/v${TARGET_TAG}.tar.gz"
            SOURCE_SHA=$(curl -fsSL "$SOURCE_URL" | sha256sum | awk '{print $1}')
            echo "source_sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            echo "Up to date."
          fi

      - name: Set branch output
        id: set-branch
        run: |
          BRANCH="bluefin-cli-${{ steps.check.outputs.latest_version }}-${{ github.run_number }}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Update formula version
        if: steps.check.outputs.needs_update == 'true'
        run: |
          VERSION="${{ steps.check.outputs.latest_version }}"
          SOURCE_SHA="${{ steps.check.outputs.source_sha }}"

          sed -i "s|^  url \".*\"|  url \"https://github.com/hanthor/bluefin-cli/archive/refs/tags/v${VERSION}.tar.gz\"|" Formula/bluefin-cli.rb
          sed -i "s|^  sha256 \".*\"|  sha256 \"${SOURCE_SHA}\"|" Formula/bluefin-cli.rb

      - name: Create PR for formula update
        id: create-pr
        if: steps.check.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          branch: ${{ steps.set-branch.outputs.branch }}
          base: main
          title: "Update bluefin-cli to ${{ steps.check.outputs.latest_version }}"
          commit-message: "chore: update bluefin-cli to ${{ steps.check.outputs.latest_version }}"

      - name: Set working branch
        id: set-working-branch
        run: |
          if [ "${{ steps.check.outputs.needs_update }}" = "true" ] && [ "${{ steps.create-pr.outputs.pull-request-number }}" != "" ]; then
             echo "working-branch=${{ steps.set-branch.outputs.branch }}" >> "$GITHUB_OUTPUT"
          else
             echo "working-branch=main" >> "$GITHUB_OUTPUT"
          fi

  build-bottles:
    needs: update-formula
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x86_64
            runner: ubuntu-24.04
          - id: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.update-formula.outputs.working-branch }}

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build bottle
        run: |
          VERSION="${{ needs.update-formula.outputs.version }}"
          export HOMEBREW_NO_AUTO_UPDATE=1

          brew install --build-bottle 'ublue-os/experimental-tap/bluefin-cli'
          brew bottle --json --root-url="https://github.com/${{ github.repository }}/releases/download/bluefin-cli-${VERSION}" 'ublue-os/experimental-tap/bluefin-cli'

      - name: Rename bottle files
        run: |
          for file in *.bottle.*; do
            [[ -f "$file" ]] || continue
            newname="${file/--/-}"
            [[ "$file" != "$newname" ]] && mv "$file" "$newname"
          done

      - name: Upload bottle artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: bottle-${{ matrix.id }}
          path: '*.bottle.*'

  build-darwin-bottles:
    needs: update-formula
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.update-formula.outputs.working-branch }}

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: 'stable'

      - name: Cross-compile and package darwin bottles
        env:
          VERSION: ${{ needs.update-formula.outputs.version }}
        run: |
          set -euo pipefail
          ROOT_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/bluefin-cli-${VERSION}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          GIT_REVISION=$(git rev-parse HEAD)

          curl -fsSL "https://github.com/hanthor/bluefin-cli/archive/refs/tags/v${VERSION}.tar.gz" | tar xz
          SOURCE_MTIME=$(stat -c %Y "bluefin-cli-${VERSION}/go.mod" 2>/dev/null || stat -c %Y "bluefin-cli-${VERSION}")
          cd "bluefin-cli-${VERSION}"

          for GOARCH in amd64 arm64; do
            if [ "$GOARCH" = "amd64" ]; then
              PLATFORM="sequoia"
              CARCH="x86_64"
              CPU_FAMILY="penryn"
            else
              PLATFORM="arm64_sequoia"
              CARCH="arm64"
              CPU_FAMILY="arm_firestorm_icestorm"
            fi

            CGO_ENABLED=0 GOOS=darwin GOARCH="${GOARCH}" go build \
              -ldflags="-s -w" -o "bluefin-cli-${PLATFORM}" .

            CELLAR="staging-${PLATFORM}/bluefin-cli/${VERSION}"
            mkdir -p "${CELLAR}/bin" "${CELLAR}/.brew"
            cp "bluefin-cli-${PLATFORM}" "${CELLAR}/bin/bluefin-cli"
            for f in CHANGELOG.md LICENSE README.md; do
              [ -f "$f" ] && cp "$f" "${CELLAR}/"
            done
            cp ../Formula/bluefin-cli.rb "${CELLAR}/.brew/"

            jq -n \
              --arg carch "$CARCH" \
              --argjson source_mtime "$SOURCE_MTIME" \
              --arg cpu_family "$CPU_FAMILY" \
              '{
                "homebrew_version": "5.1.0",
                "changed_files": ["INSTALL_RECEIPT.json"],
                "source_modified_time": $source_mtime,
                "compiler": "clang",
                "runtime_dependencies": [],
                "arch": $carch,
                "built_on": {
                  "os": "Macintosh",
                  "os_version": "macOS 15",
                  "cpu_family": $cpu_family
                }
              }' > "${CELLAR}/INSTALL_RECEIPT.json"

            FILENAME="bluefin-cli-${VERSION}.${PLATFORM}.bottle.tar.gz"
            tar czf "../${FILENAME}" -C "staging-${PLATFORM}" bluefin-cli/
            SHA=$(sha256sum "../${FILENAME}" | awk '{print $1}')

            jq -n \
              --arg version "$VERSION" \
              --arg platform "$PLATFORM" \
              --arg sha "$SHA" \
              --arg filename "$FILENAME" \
              --arg root_url "$ROOT_URL" \
              --arg date "$DATE" \
              --arg git_rev "$GIT_REVISION" \
              --arg carch "$CARCH" \
              --arg cpu_family "$CPU_FAMILY" \
              --arg github_repo "$GITHUB_REPOSITORY" \
              --arg desc "Bluefin's CLI tool" \
              --argjson source_mtime "$SOURCE_MTIME" \
              '{
                "ublue-os/experimental-tap/bluefin-cli": {
                  "formula": {
                    "name": "bluefin-cli",
                    "pkg_version": $version,
                    "path": "Library/Taps/ublue-os/homebrew-experimental-tap/Formula/bluefin-cli.rb",
                    "tap_git_path": "Formula/bluefin-cli.rb",
                    "tap_git_revision": $git_rev,
                    "tap_git_remote": ("https://github.com/" + $github_repo),
                    "desc": $desc,
                    "license": "Apache-2.0",
                    "homepage": "https://github.com/hanthor/bluefin-cli"
                  },
                  "bottle": {
                    "root_url": $root_url,
                    "cellar": "any_skip_relocation",
                    "rebuild": 0,
                    "date": $date,
                    "tags": {
                      ($platform): {
                        "filename": $filename,
                        "local_filename": $filename,
                        "sha256": $sha,
                        "tab": {
                          "homebrew_version": "5.1.0",
                          "changed_files": ["INSTALL_RECEIPT.json"],
                          "source_modified_time": $source_mtime,
                          "compiler": "clang",
                          "runtime_dependencies": [],
                          "arch": $carch,
                          "built_on": {
                            "os": "Macintosh",
                            "os_version": "macOS 15",
                            "cpu_family": $cpu_family
                          }
                        },
                        "path_exec_files": ["bin/bluefin-cli"]
                      }
                    }
                  }
                }
              }' > "../bluefin-cli-${VERSION}.${PLATFORM}.bottle.json"
          done

      - name: Upload darwin bottle artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: bottle-darwin
          path: '*.bottle.*'

  upload-bottles-to-pr:
    needs: [update-formula, build-bottles, build-darwin-bottles]
    runs-on: ubuntu-24.04
    if: needs.update-formula.outputs.pr-number != ''
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.update-formula.outputs.working-branch }}

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all bottles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: bottle-*
          merge-multiple: true
          path: .

      - name: Update formula with bottle SHAs
        run: |
          brew bottle --merge --write --no-commit ./*.bottle.json

      - name: Commit bottle updates
        uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5 # v9
        with:
          message: 'chore: add bluefin-cli bottles for ${{ needs.update-formula.outputs.version }}'

  upload-bottles-to-release:
    needs: [update-formula, build-bottles, build-darwin-bottles]
    runs-on: ubuntu-24.04
    if: needs.update-formula.outputs.pr-number == ''
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.update-formula.outputs.working-branch }}

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all bottles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: bottle-*
          merge-multiple: true
          path: .

      - name: Check if release exists
        id: check-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.update-formula.outputs.version }}"
          if gh release view "bluefin-cli-$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release-exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release-exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create new release
        if: steps.check-release.outputs.release-exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.update-formula.outputs.version }}"
          gh release create "bluefin-cli-$VERSION" ./*.bottle.* \
            --title "bluefin-cli $VERSION bottles" \
            --notes "Bottles for bluefin-cli $VERSION" \
            --repo "$GITHUB_REPOSITORY"

      - name: Update existing release
        if: steps.check-release.outputs.release-exists == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.update-formula.outputs.version }}"
          gh release upload "bluefin-cli-$VERSION" ./*.bottle.* \
            --clobber \
            --repo "$GITHUB_REPOSITORY"

      - name: Update formula with bottle SHAs
        if: success()
        run: |
          brew bottle --merge --write --no-commit ./*.bottle.json

          if git diff --quiet Formula/bluefin-cli.rb; then
            echo "No changes"
          else
            git config --global user.email "action@github.com"
            git config --global user.name "GitHub Action"
            git add Formula/bluefin-cli.rb
            git commit -m "chore: add bluefin-cli bottles for ${{ needs.update-formula.outputs.version }}"
            git push origin main
          fi
